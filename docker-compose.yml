version: "3.8"

services:
  ai-dev:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - MODEL_NAME=${MODEL_NAME}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
    volumes:
      - ai-dev-workspaces:/app/workspaces
      - ai-dev-downloads:/app/downloads
    restart: unless-stopped

volumes:
  ai-dev-workspaces:
  ai-dev-downloads:
