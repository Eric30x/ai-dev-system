<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0B0D14" rx="0"/>
  <!-- Gradient orbs -->
  <circle cx="1000" cy="100" r="350" fill="#7C3AED" opacity="0.15" filter="url(#blur)"/>
  <circle cx="250" cy="550" r="280" fill="#06B6D4" opacity="0.10" filter="url(#blur)"/>
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="100"/></filter>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Logo -->
  <rect x="540" y="180" width="80" height="80" rx="20" fill="url(#g)"/>
  <path d="M564 236L580 204L596 236" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="580" cy="204" r="4" fill="white"/>
  <!-- Title -->
  <text x="640" y="225" font-family="Inter,SF Pro Display,sans-serif" font-size="52" font-weight="900" fill="#E2E8F0" letter-spacing="-0.02em">AI Dev Platform</text>
  <!-- Subtitle -->
  <text x="640" y="275" font-family="Inter,SF Pro Display,sans-serif" font-size="22" fill="#94A3B8">Describe your idea. AI ships the entire project.</text>
  <!-- Feature pills -->
  <rect x="540" y="340" width="135" height="36" rx="18" fill="white" opacity="0.06"/>
  <text x="607" y="363" font-family="Inter,sans-serif" font-size="13" fill="#A78BFA" text-anchor="middle">🧠 Multi-Agent</text>
  <rect x="690" y="340" width="135" height="36" rx="18" fill="white" opacity="0.06"/>
  <text x="757" y="363" font-family="Inter,sans-serif" font-size="13" fill="#67E8F9" text-anchor="middle">🤖 AI Fixer</text>
  <rect x="840" y="340" width="135" height="36" rx="18" fill="white" opacity="0.06"/>
  <text x="907" y="363" font-family="Inter,sans-serif" font-size="13" fill="#34D399" text-anchor="middle">📦 Artifacts</text>
  <rect x="990" y="340" width="135" height="36" rx="18" fill="white" opacity="0.06"/>
  <text x="1057" y="363" font-family="Inter,sans-serif" font-size="13" fill="#FBBF24" text-anchor="middle">⏪ Rollback</text>
  <!-- Bottom bar -->
  <rect x="540" y="430" width="260" height="44" rx="22" fill="url(#g)"/>
  <text x="670" y="458" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">⭐ Star on GitHub</text>
  <text x="840" y="458" font-family="Inter,sans-serif" font-size="13" fill="#64748B">github.com/Eric30x/ai-dev-system</text>
</svg>
