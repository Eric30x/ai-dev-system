<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Workspace — AI Dev Platform V10.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{400:'#A855F7',500:'#8B5CF6',600:'#7C3AED'},surface:{950:'#020408',900:'#0B0D14',800:'#11131F',700:'#161825'}}}}}</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','SF Pro Display',-apple-system,sans-serif;background:#020408;color:#E2E8F0;height:100vh;overflow:hidden}
.glass{background:rgba(17,19,31,.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.05)}
.glass-strong{background:rgba(17,19,31,.85);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.07)}
.gradient-text{background:linear-gradient(135deg,#A855F7,#8B5CF6 30%,#06B6D4 70%,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-bg{background:linear-gradient(135deg,#7C3AED,#8B5CF6 50%,#06B6D4)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
/* Terminal */
.terminal{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;background:#060810;overflow-y:auto}
.terminal .t-s{color:#34D399}.terminal .t-e{color:#F87171}.terminal .t-i{color:#818CF8}.terminal .t-w{color:#FBBF24}.terminal .t-d{color:#4B5563}
/* File tree */
.tree-item{padding:3px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;border-radius:4px;margin:0 4px;transition:all .12s;white-space:nowrap}
.tree-item:hover{background:rgba(255,255,255,.04)}.tree-item.active{background:rgba(139,92,246,.15);color:#A855F7}
.tree-item.dir{color:#818CF8}.tree-item.file{color:#9CA3AF}
.tree-children{padding-left:14px}
/* Tabs */
.editor-tab{padding:6px 14px;font-size:11px;cursor:pointer;border-right:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.editor-tab:hover{background:rgba(255,255,255,.03)}.editor-tab.active{background:rgba(139,92,246,.08);color:#A855F7;border-bottom:1.5px solid #A855F7}
.editor-tab .tab-close{opacity:0;padding:2px;border-radius:3px;transition:all .15s}.editor-tab:hover .tab-close{opacity:1}.tab-close:hover{background:rgba(255,255,255,.1)}
/* Chat */
.chat-msg{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.6;max-width:100%}
.chat-user{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.15)}.chat-ai{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
/* Monaco container */
#monacoContainer{width:100%;height:100%}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}.animate-fade{animation:fadeIn .3s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.animate-pulse-slow{animation:pulse 2s ease-in-out infinite}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ─── TOP BAR ─── -->
<div class="glass-strong h-11 flex items-center justify-between px-4 shrink-0 z-10">
<div class="flex items-center gap-3">
  <a href="/" class="flex items-center gap-2 text-sm font-bold"><span class="gradient-text">AI Dev</span><span class="text-white/40 text-[10px]">V10.1</span></a>
  <span class="text-white/10">|</span>
  <span id="projectName" class="text-white/60 text-xs truncate max-w-[220px]">Loading...</span>
  <span id="projectState" class="text-[10px] px-2 py-0.5 rounded-md bg-white/5 text-white/30 uppercase"></span>
</div>
<div class="flex items-center gap-1">
  <span id="saveStatus" class="text-[10px] text-emerald-400/60 mr-2 hidden">● Saved</span>
  <button onclick="saveCurrentFile()" class="p-1.5 rounded-lg hover:bg-white/5 text-white/40 hover:text-white transition-all text-[10px] font-medium" title="Save (Ctrl+S)">Save</button>
  <button onclick="refreshFileTree()" class="p-1.5 rounded-lg hover:bg-white/5 text-white/30 hover:text-white/60 transition-all" title="Refresh files"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
  <a id="downloadBtn" href="#" class="p-1.5 rounded-lg hover:bg-white/5 text-white/30 hover:text-white/60 transition-all hidden" title="Download ZIP"><i data-lucide="download" class="w-3.5 h-3.5"></i></a>
  <a href="/" class="p-1.5 rounded-lg hover:bg-white/5 text-white/30 hover:text-white/60 transition-all" title="Dashboard"><i data-lucide="home" class="w-3.5 h-3.5"></i></a>
</div>
</div>

<!-- ─── MAIN LAYOUT ─── -->
<div class="flex" style="height:calc(100vh - 44px)">

<!-- LEFT: File Tree -->
<div class="glass border-r-0 w-56 shrink-0 flex flex-col overflow-hidden">
  <div class="px-4 py-2.5 text-[10px] text-white/25 uppercase tracking-wider font-semibold border-b border-white/[0.03] flex items-center justify-between">
    Files <span id="fileCount" class="text-white/15"></span>
  </div>
  <div id="fileTree" class="flex-1 overflow-y-auto py-1.5"></div>
</div>

<!-- CENTER: Editor Area -->
<div class="flex-1 flex flex-col min-w-0">
  <!-- Tabs bar -->
  <div id="tabBar" class="glass-strong h-9 flex items-center shrink-0 overflow-x-auto border-t-0" style="scrollbar-width:none">
    <div id="tabWelcome" class="editor-tab active text-white/30">Welcome</div>
  </div>
  <!-- Monaco Editor -->
  <div class="flex-1 overflow-hidden relative" id="monacoContainer"></div>
  <!-- Terminal -->
  <div class="border-t border-white/[0.03]">
    <div class="glass-strong h-7 flex items-center px-4 gap-2 shrink-0">
      <i data-lucide="terminal" class="w-3 h-3 text-white/25"></i>
      <span class="text-[10px] text-white/25 font-medium">Activity Log</span>
      <span id="sseStatus" class="w-1.5 h-1.5 rounded-full bg-white/15 ml-auto" title="SSE status"></span>
      <button onclick="document.getElementById('terminalBody').classList.toggle('h-32');document.getElementById('terminalBody').classList.toggle('h-56')" class="text-white/20 hover:text-white/40 text-[10px]">⤢</button>
    </div>
    <div id="terminalBody" class="terminal h-32 px-4 py-2 overflow-y-auto">
      <div class="t-d">Connected — waiting for events...</div>
    </div>
  </div>
</div>

<!-- RIGHT: AI Chat -->
<div class="glass border-l-0 w-72 shrink-0 flex flex-col overflow-hidden">
  <div class="px-4 py-2.5 text-[10px] text-white/25 uppercase tracking-wider font-semibold border-b border-white/[0.03] flex items-center justify-between">
    AI Chat
    <button onclick="document.getElementById('chatMessages').innerHTML='<div class=\'t-d text-[11px] text-center py-8\'>Ask AI to modify your project</div>'" class="text-white/20 hover:text-white/40 text-[10px]">Clear</button>
  </div>
  <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-3">
    <div class="t-d text-[11px] text-center py-8">Ask AI to modify your project</div>
  </div>
  <div class="p-3 border-t border-white/[0.03]">
    <div class="flex gap-1.5">
      <input id="chatInput" class="flex-1 bg-white/[0.03] border border-white/[0.06] rounded-lg px-3 py-2 text-xs text-white placeholder-white/20 outline-none focus:border-brand-500/30 transition-all" placeholder="Ask AI to modify code..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button onclick="sendChat()" class="gradient-bg text-white px-3 py-2 rounded-lg text-xs font-semibold hover:scale-105 transition-transform shrink-0"><i data-lucide="send" class="w-3.5 h-3.5"></i></button>
    </div>
    <div class="text-[9px] text-white/15 mt-1.5 text-center">Shift+Enter for new line</div>
  </div>
</div>

</div>

<!-- ═══════════════ MONACO LOADER ═══════════════ -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
<script>
// ─── State ───
const params = new URLSearchParams(location.search);
const PROJECT_ID = params.get('id') || '';
let monacoEditor = null;
let fileTree = {};
let openTabs = {};          // { filePath: { content, dirty, model } }
let activeFilePath = null;

// ─── Init ───
(async function init() {
  if (!PROJECT_ID) { document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-white/30 text-lg">Missing ?id= parameter</div>'; return; }
  lucide.createIcons();
  await loadProject();
  await refreshFileTree();
  connectSSE();
  await loadChat();

  // Init Monaco
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs' }});
  require(['vs/editor/editor.main'], function() {
    monaco.languages.typescript.javascriptDefaults.setDiagnosticsOptions({ noSemanticValidation: true, noSyntaxValidation: false });
    monaco.languages.typescript.javascriptDefaults.setCompilerOptions({ target: monaco.languages.typescript.ScriptTarget.ESNext, allowNonTsExtensions: true, moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs });

    monacoEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
      value: '// Select a file from the tree to start editing\n// Ctrl+S to save • Ctrl+W to close tab',
      language: 'javascript',
      theme: 'vs-dark',
      fontSize: 14,
      fontFamily: "'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace",
      fontLigatures: true,
      minimap: { enabled: true, scale: 1, showSlider: 'mouseover' },
      automaticLayout: true,
      tabSize: 2,
      insertSpaces: true,
      wordWrap: 'on',
      lineNumbers: 'on',
      renderWhitespace: 'selection',
      bracketPairColorization: { enabled: true },
      scrollBeyondLastLine: false,
      smoothScrolling: true,
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      padding: { top: 12 },
    });

    // Ctrl+S save handler
    monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => saveCurrentFile());
    // Ctrl+W close tab
    monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyW, () => {
      if (activeFilePath) closeTab(activeFilePath);
    });

    terminalAdd('t-s', '✓ Monaco Editor ready');
  });
})();

// ─── Load Project ───
async function loadProject() {
  try {
    const res = await fetch(`/api/workspace/${PROJECT_ID}`);
    const j = await res.json();
    if (j.project) {
      document.getElementById('projectName').textContent = (j.project.description||j.project.name||'').slice(0,60);
      document.getElementById('projectState').textContent = j.project.state;
      if (j.project.downloadUrl) {
        const btn = document.getElementById('downloadBtn');
        btn.href = j.project.downloadUrl;
        btn.classList.remove('hidden');
      }
    }
  } catch(e) { terminalAdd('t-e','Project load error: '+e.message); }
}

// ─── File Tree ───
async function refreshFileTree() {
  try {
    const res = await fetch(`/api/workspace/${PROJECT_ID}/files`);
    const j = await res.json();
    fileTree = j.tree || {};
    renderFileTree();
    document.getElementById('fileCount').textContent = Object.keys(fileTree).length ? `(${Object.keys(fileTree).length})` : '';
  } catch(e) {
    document.getElementById('fileTree').innerHTML = '<div class="text-white/20 text-[11px] p-4">No files yet</div>';
  }
}

function renderFileTree() {
  const container = document.getElementById('fileTree');
  const entries = Object.entries(fileTree);
  if (!entries.length) { container.innerHTML = '<div class="text-white/20 text-[11px] p-4">Empty — run a task first</div>'; return; }

  const root = {};
  for (const [p, info] of entries) {
    const parts = p.split('/');
    let node = root;
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (i === parts.length - 1) node[part] = { ...info, _path: p, _isFile: true };
      else {
        if (!node[part]) node[part] = { _isDir: true, _path: parts.slice(0,i+1).join('/') };
        node = node[part];
      }
    }
  }
  container.innerHTML = renderTree(root);
  lucide.createIcons();
  // Restore active file highlight
  if (activeFilePath) {
    const el = container.querySelector(`[data-path="${CSS.escape(activeFilePath)}"]`);
    if (el) el.classList.add('active');
  }
}

function renderTree(nodes) {
  return Object.keys(nodes).sort((a,b)=>{
    const ad=nodes[a]._isDir, bd=nodes[b]._isDir;
    return ad&&!bd?-1:!ad&&bd?1:a.localeCompare(b);
  }).map(name=>{
    const n=nodes[name], isDir=n._isDir, fp=n._path, icon=isDir?'folder':fileIcon(name);
    if(isDir) return `<div><div class="tree-item dir" onclick="toggleDir(this)" data-path="${fp}"><i data-lucide="chevron-right" class="w-3 h-3 tree-chevron"></i><i data-lucide="${icon}" class="w-3.5 h-3.5"></i><span>${escHtml(name)}</span></div><div class="tree-children hidden">${renderTree(n)}</div></div>`;
    return `<div class="tree-item file ${activeFilePath===fp?'active':''}" data-path="${fp}" onclick="openFile('${fp.replace(/'/g,"\\'")}')"><span class="w-3"></span><i data-lucide="${icon}" class="w-3.5 h-3.5"></i><span>${escHtml(name)}</span></div>`;
  }).join('');
}

function toggleDir(el) {
  const ch=el.nextElementSibling; ch.classList.toggle('hidden');
  const cv=el.querySelector('.tree-chevron');
  cv.style.transform=ch.classList.contains('hidden')?'':'rotate(90deg)';
}

function fileIcon(n) {
  if(n.endsWith('.js')||n.endsWith('.mjs')) return'file-code';
  if(n.endsWith('.ts')||n.endsWith('.tsx')) return'file-type';
  if(n.endsWith('.json')) return'file-json';
  if(n.endsWith('.md')) return'file-text';
  if(n.endsWith('.html')) return'file-code';
  if(n.endsWith('.css')) return'palette';
  if(n.endsWith('.py')) return'terminal';
  if(n==='package.json') return'package';
  return'file';
}

// ─── Monaco: Open File ───
async function openFile(filePath) {
  // If already open, switch to it
  if (openTabs[filePath]) {
    switchTab(filePath);
    return;
  }

  try {
    const res = await fetch(`/api/workspace/${PROJECT_ID}/file?path=${encodeURIComponent(filePath)}`);
    const j = await res.json();
    if (j.content !== undefined) {
      const lang = detectLanguage(filePath);
      const model = monaco.editor.createModel(j.content, lang);
      openTabs[filePath] = { content: j.content, dirty: false, model };
      addTab(filePath);
      switchTab(filePath);
      terminalAdd('t-i', `📄 Opened: ${filePath}`);
    }
  } catch(e) { terminalAdd('t-e', `Failed to open: ${filePath}`); }
}

function switchTab(filePath) {
  activeFilePath = filePath;
  const tab = openTabs[filePath];
  if (!tab) return;
  monacoEditor.setModel(tab.model);
  // Highlight tab
  document.querySelectorAll('.editor-tab').forEach(t=>t.classList.remove('active'));
  const tabEl = document.querySelector(`.editor-tab[data-path="${CSS.escape(filePath)}"]`);
  if(tabEl) tabEl.classList.add('active');
  // Highlight tree
  document.querySelectorAll('.tree-item.file').forEach(t=>t.classList.remove('active'));
  const treeEl = document.querySelector(`.tree-item.file[data-path="${CSS.escape(filePath)}"]`);
  if(treeEl) treeEl.classList.add('active');
  // Hide welcome
  document.getElementById('tabWelcome').style.display='none';
}

function addTab(filePath) {
  const bar = document.getElementById('tabBar');
  document.getElementById('tabWelcome').style.display='none';
  // Remove old tab with same path
  const old=bar.querySelector(`[data-path="${CSS.escape(filePath)}"]`);
  if(old) old.remove();
  const name=filePath.split('/').pop();
  const tab=document.createElement('div');
  tab.className='editor-tab';
  tab.dataset.path=filePath;
  tab.innerHTML=`${fileIcon(name)==='folder'?'📁':'📄'} ${escHtml(name)}<span class="tab-close" onclick="event.stopPropagation();closeTab('${filePath.replace(/'/g,"\\'")}')">×</span>`;
  tab.onclick=()=>switchTab(filePath);
  bar.appendChild(tab);
}

function closeTab(filePath) {
  if(openTabs[filePath]?.dirty) {
    if(!confirm(`${filePath} has unsaved changes. Close anyway?`)) return;
  }
  if(openTabs[filePath]?.model) openTabs[filePath].model.dispose();
  delete openTabs[filePath];
  const tab=document.querySelector(`.editor-tab[data-path="${CSS.escape(filePath)}"]`);
  if(tab) tab.remove();
  if(activeFilePath===filePath) {
    const remaining=Object.keys(openTabs);
    if(remaining.length) switchTab(remaining[remaining.length-1]);
    else {
      activeFilePath=null;
      monacoEditor.setModel(null);
      document.getElementById('tabWelcome').style.display='flex';
    }
  }
}

// ─── Save File ───
async function saveCurrentFile() {
  if(!activeFilePath || !openTabs[activeFilePath]) return;
  const content = monacoEditor.getValue();
  const status = document.getElementById('saveStatus');
  try {
    await fetch(`/api/workspace/${PROJECT_ID}/files`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({path:activeFilePath, content}),
    });
    openTabs[activeFilePath].content = content;
    openTabs[activeFilePath].dirty = false;
    openTabs[activeFilePath].model.updateOptions({ tabSize: 2 });
    status.classList.remove('hidden');
    terminalAdd('t-s', `✓ Saved: ${activeFilePath}`);
    setTimeout(()=>status.classList.add('hidden'),2000);
    // Update tab appearance
    const tab=document.querySelector(`.editor-tab[data-path="${CSS.escape(activeFilePath)}"]`);
    if(tab){tab.style.color='';tab.querySelector('.tab-close').textContent='×';}
  } catch(e) {
    terminalAdd('t-e', `Save failed: ${e.message}`);
  }
}

// Track dirty state
setInterval(()=>{
  if(!activeFilePath||!openTabs[activeFilePath]||!monacoEditor) return;
  const current=monacoEditor.getValue();
  const saved=openTabs[activeFilePath].content;
  openTabs[activeFilePath].dirty = current !== saved;
},1000);

function detectLanguage(fp) {
  if(fp.endsWith('.js')||fp.endsWith('.mjs')) return'javascript';
  if(fp.endsWith('.ts')) return'typescript';
  if(fp.endsWith('.tsx')) return'typescript';
  if(fp.endsWith('.json')||fp==='package.json') return'json';
  if(fp.endsWith('.md')) return'markdown';
  if(fp.endsWith('.html')) return'html';
  if(fp.endsWith('.css')) return'css';
  if(fp.endsWith('.py')) return'python';
  if(fp.endsWith('.yaml')||fp.endsWith('.yml')) return'yaml';
  return'plaintext';
}

// ─── SSE ───
function connectSSE() {
  const sse=new EventSource(`/api/workspace/${PROJECT_ID}/stream`);
  const st=document.getElementById('sseStatus');
  sse.addEventListener('connected',()=>{st.className='w-1.5 h-1.5 rounded-full bg-emerald-400 ml-auto'});
  sse.addEventListener('log',e=>{const d=JSON.parse(e.data);terminalAdd(d.level==='error'?'t-e':d.level==='warn'?'t-w':'t-i',d.message)});
  sse.addEventListener('progress',e=>{const d=JSON.parse(e.data);document.getElementById('projectState').textContent=d.state;if(d.state==='success'||d.state==='failed')refreshFileTree()});
  sse.addEventListener('fileChange',e=>{terminalAdd('t-i','📝 '+JSON.parse(e.data).path);refreshFileTree()});
  sse.onerror=()=>{st.className='w-1.5 h-1.5 rounded-full bg-red-400 ml-auto'};
}

// ─── Chat ───
let conversationId=null;
async function loadChat() {
  try {
    const res=await fetch(`/api/workspace/${PROJECT_ID}/chat`);
    const j=await res.json();
    conversationId=j.conversationId||null;
    if(j.messages?.length){
      document.getElementById('chatMessages').innerHTML=j.messages.map(m=>
        `<div class="chat-msg ${m.role==='user'?'chat-user':'chat-ai'} animate-fade"><div class="text-[9px] text-white/20 mb-1">${m.role==='user'?'You':'AI'}</div><div class="text-white/70 text-[11px] whitespace-pre-wrap">${escHtml(m.content||'').slice(0,600)}</div></div>`
      ).join('');
    }
  } catch(e){}
}

async function sendChat() {
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim(); if(!msg) return; inp.value='';
  const box=document.getElementById('chatMessages');

  // User message
  box.innerHTML+=`<div class="chat-msg chat-user animate-fade"><div class="text-[9px] text-white/20 mb-1">You</div><div class="text-white/70 text-[11px]">${escHtml(msg)}</div></div>`;

  // Thinking indicator
  const thinkId='think-'+Date.now();
  box.innerHTML+=`<div class="chat-msg chat-ai animate-fade" id="${thinkId}"><div class="text-[9px] text-white/20 mb-1">Agent</div><div class="text-white/40 text-[11px]"><span class="spin inline-block mr-1">◌</span>Analyzing project & generating changes...</div></div>`;
  box.scrollTop=box.scrollHeight;

  try {
    const res=await fetch(`/api/workspace/${PROJECT_ID}/agent`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });
    const j=await res.json();
    const think=document.getElementById(thinkId);
    if(!think) return;

    // Build the agent response card
    let html=`<div class="text-[9px] text-white/20 mb-1">Agent</div>`;

    // Summary
    html+=`<div class="text-white/75 text-[11px] font-semibold mb-2">${escHtml(j.summary||'Done.')}</div>`;

    // Logs
    if(j.logs&&j.logs.length){
      html+=`<div class="text-[10px] text-white/30 space-y-0.5 mb-2">`;
      j.logs.forEach(l=>{
        const c=l.startsWith('✅')?'text-emerald-400':l.startsWith('❌')||l.startsWith('🚫')?'text-red-400':l.startsWith('⚠️')?'text-amber-400':'text-white/35';
        html+=`<div class="${c}">${escHtml(l)}</div>`;
      });
      html+=`</div>`;
    }

    // Modified files
    if(j.modifiedFiles&&j.modifiedFiles.length){
      html+=`<div class="flex flex-wrap gap-1 mt-1">`;
      j.modifiedFiles.forEach(f=>{
        html+=`<span class="text-[9px] px-1.5 py-0.5 rounded-md bg-emerald-500/10 text-emerald-400 cursor-pointer hover:bg-emerald-500/20 transition-all" onclick="openFile('${f.replace(/'/g,"\\'")}')" title="Open ${escHtml(f)}">📄 ${escHtml(f.split('/').pop())}</span>`;
      });
      html+=`</div>`;
    }

    think.innerHTML=html;
    box.scrollTop=box.scrollHeight;

    // Refresh file tree if files were changed
    if(j.modifiedFiles&&j.modifiedFiles.length>0){
      terminalAdd('t-s',`✓ Agent modified ${j.modifiedFiles.length} file(s)`);
      setTimeout(refreshFileTree,800);
    }
  } catch(e){
    const think=document.getElementById(thinkId);
    if(think) think.innerHTML=`<div class="text-[9px] text-white/20 mb-1">Agent</div><div class="text-red-400/70 text-[11px]">Error: ${escHtml(e.message)}</div>`;
  }
}

// ─── Terminal ───
function terminalAdd(cls, msg) {
  const t=document.getElementById('terminalBody');
  const time=new Date().toLocaleTimeString('en-US',{hour12:false});
  t.innerHTML+=`<div class="${cls}"><span class="t-d">${time}</span> ${escHtml(msg)}</div>`;
  t.scrollTop=t.scrollHeight;
  while(t.children.length>200) t.firstChild.remove();
}

// ─── Utils ───
function escHtml(s) { if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// Clean up
window.addEventListener('beforeunload',()=>{
  if(monacoEditor) monacoEditor.dispose();
});
</script>
</body>
</html>
