<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Dev Platform — 自动生成项目</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #a371f7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 0; }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .badge { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .input-section h2 { font-size: 16px; margin-bottom: 16px; color: var(--muted); font-weight: 400; }
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; color: var(--text); font-size: 15px; resize: vertical; min-height: 100px; font-family: inherit; line-height: 1.5; }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
    textarea::placeholder { color: #484f58; }
    .btn-row { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--muted); }

    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
    .task-card:hover { border-color: var(--muted); }
    .task-card.active { border-color: var(--accent); }
    .task-card.success { border-color: var(--green); }
    .task-card.failed { border-color: var(--red); }

    .task-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .task-meta { display: flex; align-items: center; gap: 10px; }
    .task-id { color: var(--muted); font-size: 12px; font-family: monospace; background: var(--bg); padding: 2px 8px; border-radius: 4px; }
    .task-desc { font-size: 15px; font-weight: 500; }

    .state-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .state-QUEUED { background: #1f2937; color: var(--muted); }
    .state-PLANNING { background: #1c2333; color: var(--accent); }
    .state-EXECUTING { background: #2d1f0e; color: var(--yellow); }
    .state-FIXING { background: #2d1f0e; color: var(--yellow); }
    .state-VERIFYING { background: #1f1535; color: var(--purple); }
    .state-RUNNING { background: #1c2333; color: var(--accent); }
    .state-SUCCESS { background: #12261e; color: var(--green); }
    .state-FAILED { background: #2d1117; color: var(--red); }

    .task-body { padding: 0 20px 16px; }

    .progress-section { margin-bottom: 12px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.3s; }
    .progress-fill.running { background: linear-gradient(90deg, var(--accent), var(--purple)); }
    .progress-fill.success { background: var(--green); }
    .progress-fill.failed { background: var(--red); }

    .logs-toggle { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 4px; }
    .logs-toggle:hover { color: var(--text); }
    .logs-container { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; max-height: 250px; overflow-y: auto; font-size: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace; color: var(--muted); line-height: 1.8; display: none; margin-top: 8px; }
    .logs-container.show { display: block; }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-line .ts { color: #484f58; }

    .result-section { margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 13px; }
    .result-success { background: #12261e; border: 1px solid #1b4332; }
    .result-failed { background: #2d1117; border: 1px solid #5a1e2a; }
    .download-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--green); color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600; margin-top: 8px; transition: background 0.15s; }
    .download-btn:hover { background: #2ea043; }

    .queue-info { text-align: center; color: var(--muted); font-size: 12px; margin-top: 8px; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>🤖 AI Dev Platform</h1>
      <span class="badge">V6</span>
    </div>
  </div>

  <div class="container">
    <div class="input-section">
      <h2>描述你想要创建的项目</h2>
      <textarea id="taskInput" placeholder="例如：创建一个 Express.js REST API，包含用户注册登录、JWT 认证、SQLite 数据库、错误处理中间件，以及 README.md 使用说明..." rows="4"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="submitBtn" onclick="createTask()">🚀 生成项目</button>
      </div>
    </div>

    <div id="taskList"></div>
    <div id="emptyState" class="empty-state">
      <div class="icon">📝</div>
      <p>输入任务描述，AI 将自动生成完整可运行的项目</p>
    </div>
  </div>

  <script>
    const API = '/api/task';
    const tasks = {};
    let showLogs = {};

    // ─── 创建任务 ───
    async function createTask() {
      const input = document.getElementById('taskInput');
      const btn = document.getElementById('submitBtn');
      const task = input.value.trim();
      if (!task) { input.focus(); return; }

      btn.disabled = true;
      btn.textContent = '⏳ 创建中...';

      try {
        const res = await fetch(`${API}/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task }),
        });
        const data = await res.json();

        if (data.taskId) {
          input.value = '';
          tasks[data.taskId] = { ...data, logs: [], progress: 0 };
          showLogs[data.taskId] = true;
          renderTasks();
          pollStatus(data.taskId);
        } else {
          alert('创建失败: ' + (data.error || '未知错误'));
        }
      } catch (err) {
        alert('网络错误: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 生成项目';
      }
    }

    // ─── 轮询状态 ───
    async function pollStatus(taskId) {
      const poll = async () => {
        try {
          const res = await fetch(`${API}/status/${taskId}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          tasks[taskId] = { ...tasks[taskId], ...data };
          renderTasks();

          if (data.state === 'SUCCESS' || data.state === 'FAILED') {
            // 获取最终结果
            try {
              const resultRes = await fetch(`${API}/result/${taskId}`);
              const resultData = await resultRes.json();
              tasks[taskId] = { ...tasks[taskId], ...resultData };
              renderTasks();
            } catch (e) { /* ignore */ }
            return;
          }

          setTimeout(poll, 1500);
        } catch (err) {
          setTimeout(poll, 3000);
        }
      };
      poll();
    }

    // ─── 渲染任务列表 ───
    function renderTasks() {
      const container = document.getElementById('taskList');
      const empty = document.getElementById('emptyState');
      const sorted = Object.values(tasks).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (sorted.length === 0) {
        empty.style.display = 'block';
        container.innerHTML = '';
        return;
      }
      empty.style.display = 'none';

      container.innerHTML = sorted.map(t => {
        const isActive = t.state !== 'SUCCESS' && t.state !== 'FAILED';
        const cardClass = t.state === 'SUCCESS' ? 'success' : t.state === 'FAILED' ? 'failed' : isActive ? 'active' : '';
        const progressClass = t.state === 'SUCCESS' ? 'success' : t.state === 'FAILED' ? 'failed' : 'running';
        const logsVisible = showLogs[t.id];

        return `
          <div class="task-card ${cardClass}">
            <div class="task-header">
              <div>
                <div class="task-meta">
                  <span class="task-id">#${t.id}</span>
                  <span class="state-badge state-${t.state}">${t.state}</span>
                </div>
                <div class="task-desc" style="margin-top:6px;color:var(--muted);font-size:13px">${escapeHtml(t.description || '').slice(0, 100)}</div>
              </div>
            </div>
            <div class="task-body">
              <div class="progress-section">
                <div class="progress-info">
                  <span>${t.currentStep || ''}</span>
                  <span>${t.progress || 0}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill ${progressClass}" style="width:${t.progress || 0}%"></div>
                </div>
              </div>

              ${t.downloadUrl ? `
                <div class="result-section result-success">
                  ✅ 项目生成成功，可正常运行
                  <br><a class="download-btn" href="${t.downloadUrl}">📦 下载项目 ZIP</a>
                </div>
              ` : ''}
              ${t.error && t.state === 'FAILED' ? `
                <div class="result-section result-failed">
                  ❌ ${escapeHtml(t.error)}
                </div>
              ` : ''}

              ${t.logs && t.logs.length > 0 ? `
                <button class="logs-toggle" onclick="toggleLogs('${t.id}')">
                  ${logsVisible ? '▼' : '▶'} 执行日志 (${t.logs.length})
                </button>
                <div class="logs-container ${logsVisible ? 'show' : ''}" id="logs-${t.id}">
                  ${t.logs.map(l => `<div class="log-line">${escapeHtml(l)}</div>`).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleLogs(taskId) {
      showLogs[taskId] = !showLogs[taskId];
      renderTasks();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Enter 键提交
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        createTask();
      }
    });

    // 加载已有任务
    (async () => {
      try {
        const res = await fetch(`${API}/list`);
        const data = await res.json();
        if (data.tasks) {
          data.tasks.forEach(t => {
            tasks[t.id] = { ...t, logs: [] };
            showLogs[t.id] = false;
            if (t.state !== 'SUCCESS' && t.state !== 'FAILED') {
              pollStatus(t.id);
            }
          });
          renderTasks();
        }
      } catch (e) { /* first visit, no tasks yet */ }
    })();
  </script>
</body>
</html>
